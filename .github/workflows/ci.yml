name: ClassTrack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- Backend ----
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npx eslint . --ext .js --ignore-path .eslintignore || true
        working-directory: backend

      - name: Start backend & health check
        run: |
          cp .env.example .env
          echo "MONGO_URI=mongodb://localhost:27017/classtrack_ci" >> .env
          echo "JWT_SECRET=ci_test_secret_2024" >> .env
          node server.js &
          sleep 5
          curl -f http://localhost:5000/ || exit 1
        working-directory: backend
        env:
          NODE_ENV: test

  # ---- Frontend ----
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_GA_MEASUREMENT_ID: G-PLACEHOLDER

  # ---- Load Test (optional, runs on main only) ----
  load-test:
    name: k6 Load Test (smoke)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main'

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend
        run: npm ci
        working-directory: backend

      - name: Start backend
        run: |
          cp .env.example .env
          echo "MONGO_URI=mongodb://localhost:27017/classtrack_ci" >> .env
          echo "JWT_SECRET=ci_test_secret_2024" >> .env
          node server.js &
          sleep 5
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Seed admin user
        run: node utils/seed.js
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/classtrack_ci
          JWT_SECRET: ci_test_secret_2024

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run smoke load test (50 VUs, 30s)
        run: |
          k6 run \
            --vus 50 \
            --duration 30s \
            --env BASE_URL=http://localhost:5000/api \
            load-tests/k6/classtrack-load-test.js
